<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management System - Centers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar" class="active">
            <div class="sidebar-header">
                <h3>School Management</h3>
                <strong>SM</strong>
            </div>

            <ul class="list-unstyled components">
                <li class="active">
                    <a href="dashboard.html">
                        <i class="bi bi-speedometer2"></i>
                        Dashboard
                    </a>
                </li>
                <li>
                    <a href="#centersSubmenu" data-bs-toggle="collapse" aria-expanded="false" class="dropdown-toggle">
                        <i class="bi bi-building"></i>
                        Centers
                    </a>
                    <ul class="collapse list-unstyled" id="centersSubmenu">
                        <li>
                            <a href="centers.html">Manage Centers</a>
                        </li>
                    </ul>
                </li>
                <li>
                    <a href="#departmentsSubmenu" data-bs-toggle="collapse" aria-expanded="false" class="dropdown-toggle">
                        <i class="bi bi-diagram-3"></i>
                        Departments
                    </a>
                    <ul class="collapse list-unstyled" id="departmentsSubmenu">
                        <li>
                            <a href="departments.html">Manage Departments</a>
                        </li>
                    </ul>
                </li>
                <li>
                    <a href="staff.html">
                        <i class="bi bi-people"></i>
                        Staff Management
                    </a>
                </li>
                <li>
                    <a href="reports.html">
                        <i class="bi bi-file-earmark-text"></i>
                        Reports
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Page Content -->
        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-light">
                <div class="container-fluid">
                    <button type="button" id="sidebarCollapse" class="btn btn-info">
                        <i class="bi bi-list"></i>
                    </button>
                    <div class="ms-auto">
                        <ul class="navbar-nav">
                            <li class="nav-item dropdown">
                                <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                    <i class="bi bi-person-circle"></i> Registrar
                                </a>
                                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                                    <li><a class="dropdown-item" href="#">Profile</a></li>
                                    <li><a class="dropdown-item" href="#">Settings</a></li>
                                    <li><hr class="dropdown-divider"></li>
                                    <li><a class="dropdown-item" href="#" id="logout">Logout</a></li>
                                </ul>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>

            <div class="container-fluid">
                <div class="row">
                    <div class="col-12">
                        <h2>Centers Management</h2>
                        <div class="card shadow-sm mb-4">
                            <div class="card-body">
                                <div class="d-flex justify-content-between mb-3">
                                    <h5 class="card-title">All Centers</h5>
                                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCenterModal">
                                        <i class="bi bi-plus"></i> Add New Center
                                    </button>
                                </div>
                                <div class="table-responsive">
                                    <table class="table table-striped table-hover" id="centersTable">
                                        <thead>
                                            <tr>
                                                <th>ID</th>
                                                <th>Center Name</th>
                                                <th>Location</th>
                                                <th>Coordinator</th>
                                                <th>Status</th>
                                                <th>Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <!-- Centers will be populated via JavaScript -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Center Modal -->
    <div class="modal fade" id="addCenterModal" tabindex="-1" aria-labelledby="addCenterModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addCenterModalLabel">Add New Center</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="addCenterForm">
                        <div class="mb-3">
                            <label for="centerName" class="form-label">Center Name</label>
                            <input type="text" class="form-control" id="centerName" required>
                        </div>
                        <div class="mb-3">
                            <label for="centerLocation" class="form-label">Location</label>
                            <input type="text" class="form-control" id="centerLocation" required>
                        </div>
                        <div class="mb-3">
                            <label for="centerCoordinator" class="form-label">Coordinator</label>
                            <select class="form-select" id="centerCoordinator" required>
                                <option value="">Select Coordinator</option>
                                <!-- Coordinators will be populated via JavaScript -->
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="saveCenterBtn">Save Center</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/centers.js"></script>
</body>
</html>
